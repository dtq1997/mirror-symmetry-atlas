  - slug: xu-quantum-groups-2017
    date: "2017"
    precision: year
    title:
      en: "Xu connects Frobenius manifolds and quantum groups"
      zh: "徐晓濛建立 Frobenius 流形与量子群的联系"
    description: |
      "Frobenius Manifolds and Quantum Groups" 将两个几乎不相交的领域
      （经典 Frobenius 流形理论和量子群/Poisson 几何）桥接起来。
    people: [xu-xiaomeng]
    concepts: [frobenius-manifold, quantum-groups, stokes-phenomenon]
    papers: []
    era: contemporary
