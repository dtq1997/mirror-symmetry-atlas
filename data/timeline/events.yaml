events:
  - slug: witten-2dtft-1990
    date: "1990"
    precision: year
    title:
      en: "Witten's 2D topological gravity and intersection numbers"
      zh: "Witten 提出二维拓扑引力与交叉数猜想"
    description: |
      Witten conjecture: the generating function of intersection numbers
      on $\overline{M}_{g,n}$ is a tau-function of the KdV hierarchy.
    people: []
    concepts: [gromov-witten-theory, integrable-hierarchy]
    papers: []
    era: modern
    importance: milestone

  - slug: wdvv-equations-1990
    date: "1990"
    precision: year
    title:
      en: "WDVV equations discovered"
      zh: "WDVV 方程被发现"
    description: |
      Witten, Dijkgraaf, Verlinde & Verlinde 发现了拓扑场论中的结合性方程。
    people: []
    concepts: [wdvv-equations, topological-field-theory]
    papers: []
    era: modern
    importance: milestone

  - slug: kontsevich-witten-1992
    date: "1992"
    precision: year
    title:
      en: "Kontsevich proves Witten conjecture"
      zh: "Kontsevich 证明 Witten 猜想"
    description: |
      Kontsevich 用矩阵积分方法证明了 Witten 猜想。
    people: [kontsevich]
    concepts: [gromov-witten-theory, integrable-hierarchy]
    papers: []
    era: modern
    importance: milestone

  - slug: cecotti-vafa-tt-star-1993
    date: "1993"
    precision: year
    title:
      en: "Cecotti-Vafa classification of N=2 theories"
      zh: "Cecotti-Vafa N=2 理论分类"
    description: |
      tt* geometry 的奠基工作。将拓扑-反拓扑融合与 Stokes 现象联系起来。
    people: []
    concepts: [tt-star-geometry, stokes-phenomenon]
    papers: []
    era: modern
    importance: major

  - slug: dubrovin-frobenius-1994
    date: "1994"
    precision: year
    title:
      en: "Dubrovin introduces Frobenius manifolds"
      zh: "Dubrovin 引入 Frobenius 流形"
    description: |
      229 页的 "Geometry of 2D topological field theories" 奠定了
      Frobenius 流形理论的基础，统一了 WDVV 方程、量子上同调和可积系统。
    people: [dubrovin]
    concepts: [frobenius-manifold, wdvv-equations, quantum-cohomology]
    papers: ["hep-th/9407018"]
    era: modern
    importance: milestone

  - slug: kontsevich-hms-1994
    date: "1994-08"
    precision: month
    title:
      en: "Kontsevich proposes Homological Mirror Symmetry"
      zh: "Kontsevich 提出同调镜像对称猜想"
    description: |
      ICM Zurich 报告，提出 HMS：
      $D^b\mathrm{Coh}(X) \cong D^\pi\mathrm{Fuk}(\check{X})$
    people: [kontsevich]
    concepts: [homological-mirror-symmetry, mirror-symmetry]
    papers: ["alg-geom/9411018"]
    era: modern
    importance: milestone

  - slug: dubrovin-icm-1998
    date: "1998"
    precision: year
    title:
      en: "Dubrovin's ICM talk on Frobenius manifolds"
      zh: "Dubrovin 在 ICM 做 Frobenius 流形报告"
    description: |
      Berlin ICM 邀请报告，综述 Frobenius 流形与可积系统。
    people: [dubrovin]
    concepts: [frobenius-manifold]
    papers: []
    era: modern
