      zh: "Cotti-Dubrovin-Guzzetti：特征值合并时的等单值变形"
    description: |
      解决了 Frobenius 流形理论中长期悬而未决的 coalescence 问题。
      Dubrovin 生前最后的重要合作成果之一。
    people: [cotti, dubrovin, guzzetti]
    concepts: [isomonodromy, frobenius-manifold, stokes-phenomenon]
