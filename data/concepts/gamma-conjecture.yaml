definition: |
  对 Fano 流形 $X$：
  - **Gamma I**：Dubrovin 联络的主渐近类等于
    $\hat{\Gamma}_X \cdot \mathrm{ch}(\mathcal{O})$，将平坦截面与
    Gamma 整结构联系起来。
  - **Gamma II**（假设半单性）：full exceptional collection 对应于渐近指数基本解。
  精化了 Dubrovin 关于量子上同调与导出范畴关系的原始猜想。
