definition: |
  Liu-Weinstein-Xu (1997) 引入的结构：向量丛 $E \to M$ 配
  anchor $\rho: E \to TM$、非退化对称双线性形 $\langle \cdot, \cdot \rangle$
  和 Dorfman bracket，满足 Courant 公理。推广了 Lie bialgebroid
  的 double。在 generalized geometry、超弦 T-duality、H-flux
  几何中核心。
