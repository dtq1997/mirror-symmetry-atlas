definition: |
  Grothendieck 引入的代数 $K$-理论、Atiyah-Hirzebruch 的拓扑
  $K$-理论、以及 Connes 的算子 $K$-理论共同构成 $K$-理论家族，
  研究向量丛／射影模／算子代数的 Grothendieck 群结构。
  镜像对称中 B-模型的 Chern character 自然取值于 $K$-理论，
  为 Gamma 猜想等提供对象。
