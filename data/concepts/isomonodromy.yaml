definition: |
  线性 ODE 系统 $\frac{dY}{dz} = A(z,t) Y$ 的变形，使得 monodromy 数据
  （monodromy 矩阵 + Stokes 矩阵）在参数 $t$ 变化时保持不变。由非线性方程
  （如 Painlevé 方程、Schlesinger 系统）控制。
