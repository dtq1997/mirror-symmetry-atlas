definition: |
  Fan-Jarvis-Ruan-Witten 理论：Landau-Ginzburg 奇点 $(W, G)$
  的 $A$-侧枚举理论，作为 LG mirror symmetry 的 A-model。
  对 quasi-homogeneous 多项式 $W$ 定义 FJRW 不变量，满足
  Virasoro 约束和 CohFT 公理。在 Witten 奇点 $W = x^r$ 情形
  恢复 $r$-spin intersection numbers。
