definition: |
  Kyoji Saito 引入的原初形式 $\zeta$：孤立超曲面奇点 $W$ 的
  半泛形变上，$\zeta \in \Omega^n(\mathcal{X}/S)$ 满足若干
  公理，诱导出 $S$ 上的 flat structure（即 Saito 结构，
  也称 flat Frobenius 结构）。为 mirror symmetry 中 B-侧
  Landau-Ginzburg 模型提供核心技术。
