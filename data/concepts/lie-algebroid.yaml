definition: |
  向量丛 $A \to M$ 配备 Lie 括号 $[\cdot, \cdot]$（作用在截面上）
  和 anchor 映射 $\rho: A \to TM$，满足 Leibniz 关系
  $[s_1, f s_2] = f [s_1, s_2] + (\rho(s_1) f) s_2$。
  为 Lie 群胚的无穷小对应，统一涵盖切丛、Poisson 流形、
  对合分布、Lie 代数作用等。
