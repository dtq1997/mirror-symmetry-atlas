category: equation
difficulty: advanced
discipline: both
year_introduced: 1990
introduced_by: [witten, dijkgraaf]
definition: |
  关于函数 $F(t)$ 的非线性偏微分方程组：
  $\frac{\partial^3 F}{\partial t^\alpha \partial t^\beta \partial t^\mu} \eta^{\mu\nu}
  \frac{\partial^3 F}{\partial t_\nu \partial t^\gamma \partial t^\delta}
  = \frac{\partial^3 F}{\partial t^\delta \partial t^\beta \partial t^\mu} \eta^{\mu\nu}
  \frac{\partial^3 F}{\partial t_\nu \partial t^\gamma \partial t^\alpha}$
  表达量子乘积的结合律。
