notes: |
  北京大学数学科学学院是国内数学研究的顶级机构之一。
  BICMR（北京国际数学研究中心）是其国际化研究平台，单独建档 pku-bicmr。
  刘小博的 Gromov-Witten 学派（王新、杨成浪、邬龙挺等）是本平台核心追踪对象。
