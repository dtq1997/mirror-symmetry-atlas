personal_notes: |
  BIMSA 助理教授，数学物理组。2013 年本科毕业于川大，2018 年博士毕业于北大
  BICMR（导师樊慧君 Huijun Fan），博士论文获 New World Mathematics Award 荣誉提名。
  2018-2021 在清华 YMSC 做博士后，师从李思 (Si Li)。
  核心方向：Landau-Ginzburg B-model 中的 tt* geometry 与 BCOV 量子化理论；
  LG B-model 与可积 hierarchy 的关系；mirror symmetry 与 LG-CY correspondence
  via mixed Hodge structure。另有 isomonodromic deformation / KZ 方程 /
  Riemann-Hilbert 问题的综述工作 (ICCM Notices 2024)。

  近期拓展：
  (1) 与 Si Li、Gui 合作研究椭圆曲线上 chiral CFT 的 contact term 代数和
      Dijkgraaf master equation (2025);
  (2) 与丘成桐 (S.-T. Yau) 合作 path homology / digraph cellular homology。

  与李思、He Weiqiang 在 Kodaira-Spencer gravity 工作 (arXiv:1910.05665)
  是他的代表性合作。与 Junrong Yan 的 CY/LG Weil-Peterson 工作 (2022/2025)
  推进了 tt* 结构的 CY/LG 对应理解。

  BIMSA 与 Tsinghua YMSC 的 Algebraic Geometry / Integrability 项目组织者之一
  （与 Li Wang 合办 Topics in Integrability seminar）。

  2026 HUST 数学物理与几何研讨会参会。
