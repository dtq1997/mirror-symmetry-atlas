personal_notes: |
  南昌航空大学数学与信息科学学院教师，硕士生导师。
  研究方向：higher Courant algebroid, Lie 2-algebra, n-Lie-Rinehart 代数,
  Filippov algebroid, 以及近年在 sp(6) 相关的可积 hierarchy。

  论文发表活跃期 2010-至今。最早合作者为 Yunhe Sheng (盛云和, 吉林大学)，
  疑似博导 [待验证]。之后主要合作者为 Tao Zhang（河南师大/类似）和
  Zhixiong Chen。近年与 Zhuo Chen (清华)、Maosong Xiang 进入 Filippov
  algebroid 和 n-system 方向。

  博士机构和导师 [待验证]。
  职称级别 [待验证]（x-mol 仅列"硕士生导师"；搜索未明确"副教授"字样）。
  2026 HUST 数学物理与几何研讨会参会。
