personal_notes: |
  北大 BICMR 教授 (2023 起)。2005 北大本科→2010 Northwestern 博士 (导师 Eric Zaslow)→
  Columbia Ritt 助理教授 (2010-2014)→北大 BICMR (2014 起, 2015 青千)。

  与刘秋菊(Melissa Liu)长期合作(11篇), 与宗正宇合作(7篇), 三人形成 toric CY / remodeling
  conjecture 核心团队。主要贡献: coherent sheaf-constructible sheaf 对应 (HMS 重要方法),
  Remodeling Conjecture 的证明 (拓扑递归+枚举几何), 发表于 Invent. Math. 和 JAMS。

  2026 HUST 会议报告: Conic bundle and the mirror hypersurface for a toric CY n-fold
  (with Yuze Sun, Peng Zhou)。HMS, Gamma classes, microlocal sheaves。

  承担 NSFC 杰青项目 12125101 "镜像对称" (2021-2026)。
