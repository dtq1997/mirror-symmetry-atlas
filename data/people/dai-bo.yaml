personal_notes: |
  北京大学数学科学学院副教授（非教授），数学物理教研室。
  南开大学本科(1994) → NUS 硕士(1998) + 博士(2002) → 中科院博后(2002-2004) → 北大讲师(2004) → 北大副教授(2007-)。
  NUS 博士导师尚未查到，Math Genealogy Project 无此人条目。
  研究分两条线：(1) 与 Chuu-Lian Terng/Karen Uhlenbeck 合作的 ASDYM/Ward soliton/monopole 方向 (2004-2007)；
  (2) 与 Chung-I Ho/Tian-Jun Li 合作的 4-流形最小亏格/Lagrangian 曲面方向 (2016-2021)；
  近年转向 Vafa-Witten 方程横截性问题，与 Ren Guan 合作 (2022-2025)。
  教学方面获多项教学奖（包括2023年国家级教学成果一等奖）。
  2026 HUST 会议报告: Soliton solutions of ASDYM equation on R^{2,2} and its reductions.
  办公室: 1587E。
