personal_notes: |
  南昌航空大学数学与信息科学学院讲师 (2021.01 起)，北京大学基础数学博士。
  研究方向：数学物理与代数几何，具体是 Lie pair、dg manifold、
  Atiyah class、Hopf algebroid / quantum groupoid 与 brace B∞ algebras。

  所有 4 篇论文均与 Zhuo Chen (陈酌, 清华) 合作——陈酌极可能是博士导师或
  博士期间合作者 [待验证]。论文合作网络：
  - 与陈酌、倪大地 (ni-dadi, 河南大学) 2019/2022 两篇关于 Lie pair / L≤3
    algebra / Hopf algebra from dg manifold 的文章；
  - 与陈酌、乔雨 (yu-qiao)、Maosong Xiang 2024/2025 两篇 quantum groupoid
    相关工作。

  博士毕业年份和确切博导 [待验证]。
  2026 HUST 数学物理与几何研讨会参会。
