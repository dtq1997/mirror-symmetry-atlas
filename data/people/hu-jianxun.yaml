personal_notes: |
  中山大学数学学院教授、副院长，symplectic topology 和 Gromov-Witten 理论资深专家。
  兰州大学本硕博 (1983/1987/1993)，1993-1995 年在中山大学物理系做理论物理博士后，
  1995 年起在中山大学数学系任教，2002 年晋升教授，2003 年获博士生导师资格。
  2008 年获国家杰出青年科学基金（杰青）支持。
  国际访学经历丰富：Wisconsin, MPIM Bonn, HKUST, UC Berkeley MSRI, 密歇根大学, KIAS 等。
  主要科学贡献：
  (1) 辛流形 Gromov-Witten 不变量在 blow-up 下的变化公式 (Compositio Math. 2001, Math. Z. 2000)；
  (2) 与 Li Tianjun, Ruan Yongbin 合作证明 uniruledness 是辛流形 birational invariant (Invent. Math. 2008)，里程碑成果；
  (3) Mukai flop 下 Ruan cohomology 不变性 (Math. Ann. 2004, 与 Zhang Wanchuan)；
  (4) Donaldson-Thomas 不变量的 blow-up 公式；
  (5) 2019 年起与柯华忠、李长征合作推进 Gamma conjecture / Conjecture O 方向，2024 年发现 Gamma conjecture I 反例并修正 (与 Galkin, Iritani, 柯华忠, 李长征, Su) — 重要进展；
  (6) 近年与 Ding Yanqiao 合作 refined floor diagrams 和 Welschinger invariants。
  何伟强（SYSU 副教授）可能师承 [待验证]。
  注：柯华忠是清华周坚博士毕业后回 SYSU，非胡建勋学生，属同事关系。
  奖项还包括：2000 年广东省"南粤优秀教师（教坛新秀）"称号、2002 年广东省"千百十工程"培养对象、
  2003 年广东省自然科学优秀学术论文一等奖、2004 年教育部新世纪优秀人才。
  承担过 973 课题"广义相对论和拓扑量子场论中的数学问题" (2006-2011)。
  2026 年 4 月 HUST "数学物理与几何研讨会"参会人员之一。
