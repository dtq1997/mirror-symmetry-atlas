personal_notes: '极具人格魅力的导师。晚年与 ALS 斗争期间仍坚持研究。

  SISSA 设立 Boris Dubrovin Medal 纪念，每两年颁发。

  Frobenius 流形理论的奠基人，229 页的 "Geometry of 2D TFT" 是该领域圣经。

