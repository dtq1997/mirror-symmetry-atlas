personal_notes: |
  北大 BICMR 博士（导师刘小博）→ ETH Zurich (Pandharipande 组) 博后 → MPI Bonn → 南科大副教授。
  GW 理论和枚举几何方向的青年学者。代表作：quintic threefold GW 不变量 (Adv. Math. 2018)；holomorphic anomaly equation for (P^2,E) (Forum Math. Pi 2021)。
  2026 HUST 会议报告: Poincaré polynomials of moduli spaces of 1-dimensional sheaves on P^2.
  Joint with Shuai Guo and Miguel Moreira.
  NSFC 青年基金 B类 (200万, 2026-2028); 国家重点研发 (300万, 2022-2027)。
  Erdos number: 5.
  Math Genealogy 上刘小博 (ID 23067) 名下暂未列出其为学生。
  注意：姓"邬"非"邹"。
