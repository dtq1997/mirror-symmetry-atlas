personal_notes: |
  四川大学数学学院教授。长期方向：多元 zeta 值 (MZV) 的重整化，Connes-Kreimer Hopf 代数框架，
  代数 Birkhoff 分解，locality morphisms, 锥形 zeta 值 (conical zeta values)。
  最稳定的合作者是 Li Guo（Rutgers-Newark）与 Sylvie Paycha（Potsdam），三人从 2009 开始合作
  超过 10 年，主要成果将量子场论中的重整化方法与 Connes-Kreimer Hopf 代数方法推广到
  MZV 的发散情形、树上 branched zeta 值、以及 meromorphic germs 的 locality 结构。

  2024 年在吉林大学报告题目《多元 zeta 值的洗牌 Hopf 代数》。

  2026 HUST 会议参会者。与会议主流方向（Frobenius manifold / GW 理论 / 可积系统）
  不直接重合，但 Connes-Kreimer 重整化在 BV 形式、规范场论、形式路径积分等
  多个镜像对称相关方向都有应用，是潜在的跨组连接点。
