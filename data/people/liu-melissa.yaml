personal_notes: |
  1974.12.15 出生于台湾。台大 1996 → Harvard PhD 2002 (Yau)。
  Harvard Society of Fellows → Northwestern → Columbia (2008 tenure, 2012 full)。
  曾任 MSRI Chern Professor。AMS Fellow 2012 首届。
  与方博汉 (11 篇)、宗正宇 (6 篇) 形成 toric CY / remodeling conjecture 核心团队。
  Remodeling Conjecture (BKMP) 的主要推动者之一。
