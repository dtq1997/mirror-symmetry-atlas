personal_notes: |
  中国科学院院士 (2001)。北大 BICMR 创始主任 (2005 起), 普林斯顿 Eugene Higgins Professor。

  教育: 南大本科(1982)→北大硕士(1984)→哈佛博士(1988, 导师 Yau), 论文 "Kähler Metrics on
  Algebraic Manifolds"。

  主要贡献: Kähler-Einstein 度量存在性、K-稳定性(Yau-Tian-Donaldson 猜想)、
  Kähler-Ricci 流(与宋镇合作的 Tian-Song MMP 理论)、与 John Morgan 合作阐释
  Perelman 的 Poincaré/几何化猜想证明。与刘小博合作证明 genus-0 Virasoro 猜想 (1998)。

  重要奖项: Waterman Award (1994), Veblen Prize (1996), AAAS Fellow (2004),
  ICM 2002 全体报告。
