personal_notes: |
  武汉大学数学与统计学院院长(2024.11 起)、弘毅讲席教授。北京大学教授(仍保留)。
  FJRW 理论的"F"——与 Tyler Jarvis、Yongbin Ruan 共同创立量子奇点理论 (Fan-Jarvis-Ruan-Witten)，
  系列奠基性论文 0712.4021 / 0712.4025 / math/0409434 发表于 Ann. of Math. (2013)。
  国家杰青(2013)、长江学者(2015)、国家自然科学奖二等奖(2017，独立)、教育部自然科学奖一等奖(2015，独立)。
  2021 年中国数学会学术年会大会邀请报告人。担任 Science China: Math 等多个期刊编委。
  研究方向：FJRW 理论、Landau-Ginzburg 模型、镜像对称、GLSM、奇点理论；早期工作涉及
  调和映射、Novikov-Morse 理论、Conley index 理论。2024 年 11 月全职加盟武大，同时兼任华科大
  数学与交叉学科研究所学术委员会委员。
