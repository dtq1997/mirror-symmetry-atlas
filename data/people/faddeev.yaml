personal_notes: |
  量子逆散射方法（quantum inverse scattering method）的创始人之一。
  Alekseev 的导师。对量子群和可积系统的发展有奠基性贡献。
  博导 Olga Ladyzhenskaya，Vladimir Fock 为精神导师。
  LOMI/PDMI 负责人 1976-2000，Euler Institute 创始人 1988。
  旗舰大奖：Heineman 1974、Dirac 1990、Max Planck 1996、Poincaré 2006、Shaw 2008。
  2017 年去世。
