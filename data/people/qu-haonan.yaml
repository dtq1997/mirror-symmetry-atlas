personal_notes: |
  清华大学数学科学系博士毕业，师从张友金（亦与刘思齐深度合作），方向 Integrable Systems / Mathematical Physics。
  2025 年 10 月 arXiv 论文 affiliation 为北京大学数学科学学院，表明曾在或正在 PKU。
  同时出现在中山大学数学学院博导名单中，可能是刚入职或双聘 [待验证]。
  研究方向：广义 Frobenius 流形 (generalized Frobenius manifolds with non-flat unity) 及其关联的可积系统。
  与用户唐乾是同一个学术生态：刘思齐 + 张友金组（WDVV 方程、Frobenius 流形、可积系统）。
  核心成果：
  (1) 2022 年与刘思齐、张友金构造 non-flat unity generalized Frobenius manifold 的 Principal Hierarchy，
      含 Virasoro 对称、tau 结构、拓扑变形，连接 Volterra、q-deformed KdV、Ablowitz-Ladik 等可积系统 (CMP 2024)；
  (2) 2024 年关于 loop 方程的解的存在唯一性 (与刘思齐、王跃伟、张友金)；
  (3) 2024 年 Legendre 变换下的 hierarchies 等价性 (CMP 2025)；
  (4) 2021 年 Ablowitz-Ladik hierarchy 的 tri-Hamiltonian 结构，支持 Brini 关于 local CP1 GW 不变量的猜想。
  与何伟强（SYSU）师门相近：均处于 Frobenius 流形 / Landau-Ginzburg / 可积系统生态。
  2026 年 4 月 HUST "数学物理与几何研讨会"参会人员之一。
  [待验证] 中山大学 vs 北京大学当前主要 affiliation，以及在 SYSU 的具体职位。
