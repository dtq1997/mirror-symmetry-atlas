personal_notes: |
  中科大本科 → UC Berkeley 博士（导师 Peter Teichner, 2011）→ 中科大特任副教授 → 港中文博后 → 南科大助理教授 → 深圳量子研究院副研究员。
  与 Kwokwai Chan 和 Naichung Conan Leung (CUHK) 长期合作（2016年起），核心项目：Kähler 流形上不同量子化方案（deformation, geometric, Berezin-Toeplitz, BV）之间的关系。
  提出"non-formal quantization"概念，成果发表于 Adv. Math.。
  与 Si Li 合作研究 B-twisted topological sigma model (J. Differential Geom. 2016)。
  2018 ICCM 最佳论文奖（BV quantization and algebraic index, Adv. Math. 2017）。
  2026 HUST 会议报告: Quantization of Kähler manifolds via differential operators.
  Joint with Kwokwai Chan, Conan Leung, and Yutung Yau.
  NSFC 项目 (No. 12471061)。广东省自然科学基金支持。
  注意：与 UW-Madison 的 Qin Li（应用数学/kinetic theory，导师 Shi Jin）是不同人。
