personal_notes: |
  香港科技大学数学系教授(2024 年杰青后晋升)。注意：中文名"张怀良"对应 Wade-Giles 拼音 "Chang"
  (台湾传统拼法) 而非大陆"Zhang"。该姓氏混淆在中英文语境中常见。
  Stanford 博士(2007)，导师 Jun Li (李骏)。与 Jun Li 长期深度合作 12 篇论文。
  核心贡献：(1) Mixed-Spin-P (MSP) 理论与 N-MSP 理论，将 FJRW、GW、quasimap 理论统一；
  (2) 证明 BCOV 猜想关于 quintic 3-fold GW 势的多项式结构 (Ann. of Math. 2021，与郭帅、李骏合作);
  (3) Cosection localization 方法 (与 Kiem、Jun Li)。
  2024 年获国家杰青。用户指定机构为 wuhan，但其实际工作单位为 HKUST。
  2026 HUST 数学物理与几何研讨会中可能作为参会学者出席。
