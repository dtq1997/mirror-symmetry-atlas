personal_notes: |
  两个几乎不相交的 cluster 之间的桥梁节点：
  - Cluster A（SISSA/Dubrovin 学派）：经典 Frobenius 流形、Painlevé、isomonodromy
  - Cluster B（Xu/Alekseev 学派）：quantum groups、Poisson geometry、Stokes 量子化
  同时在两组工作，研究方向是两个 cluster 的精确交叉点。

