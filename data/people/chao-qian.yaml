personal_notes: |
  武汉大学数学与统计学院(2024 起)。博士毕业于 Ohio State University，导师 Hsian-Hua Tseng
  (曾显华，OSU)。研究方向：Gromov-Witten 理论、toric stack bundles、crepant transformation
  correspondence、derived categories。
  核心工作：与导师 Tseng 和 NTHU 的 Jiun-Cheng Chen 合作，研究 toric stack bundles 的
  I-function、Mellin-Barnes 积分的解析延拓与 Fourier-Mukai 变换，建立了 toric stack bundles
  之间 genus-zero GW 理论的 crepant transformation correspondence。
  注意：中文名"钞乾"(姓"钞"，较罕见)与另一位名为 Chao Qian (陈志周-唐梓洲组从事 isoparametric
  foliations 方向，曾在 Capital Normal Univ) 不同人，不要混淆。
  2026 HUST 数学物理与几何研讨会武大参会学者之一。
