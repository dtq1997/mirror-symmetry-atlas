personal_notes: |
  中山大学数学学院教授。2018年优青。
  USTC 本科(2003) → 香港中文大学 MPhil(2005) + PhD(2009, 梁乃聪) → KIAS 博后(2009-2011, mentor Bumsig Kim)
  → Kavli IPMU 博后(2011-2014) → IBS-CGP tenure-track(2014-2016) → 中山大学教授(2016-)。
  论文 Quantum cohomology of homogeneous varieties (PhD thesis)。
  三个核心研究方向：
  (1) Flag varieties 的 quantum Schubert calculus (博士以来一直做)，与 Leung, Mihalcea, Rietsch 等合作；
  (2) Gamma conjecture / Conjecture O 方向，2024 年与 Galkin, Iritani 等发现 Gamma conjecture I 反例并修正，重要进展；
  (3) Mirror symmetry for singularities/primitive forms，与 Si Li, K. Saito 合作 (JEMS 2017)。
  近年非常活跃（2025年已 8 篇 arXiv），团队包括 Ke Huazhong, Jiayu Song, Mingzhi Yang 等年轻合作者。
  编辑 2 本学术著作 (Adv. Stud. Pure Math. vol.83; Springer Proc. Math. Stat. vol.332)。
  2026 HUST 会议报告: Quantum Schubert calculus for smooth Schubert divisors in $Fl_n$。
  办公室: 815, 中山大学新数学楼。
