personal_notes: |
  中山大学数学学院(珠海)助理教授, 2020 年起任职。

  本科(2008-2012)、博士(2012-2017)均在中山大学, 博士期间(2015-2016)曾赴
  南密西西比大学联合培养。博导罗俊 (SYSU 数学学院, 分形拓扑/动力系统方向)。
  PKU 博士后(2018-2020)后回 SYSU(珠海校区)任教。

  研究方向: 动力系统与连续统理论, 有理函数 Julia 集的几何拓扑, 自相似 tiles。
  代表作: Luo-Yang (Chaos Solitons & Fractals 2017), Loridant-Luo-Yang (Adv Math 2019)。

  与当前数据库的主导方向(镜像对称/GW/Frobenius)不重叠, 是来听 HUST 2026 研讨会的
  参会者而非领域内合作者。

  **名字修正**: 原数据标"杨艺", 经 SYSU 珠海 faculty 页确认应为"杨毅" (2026-04 更正)。
