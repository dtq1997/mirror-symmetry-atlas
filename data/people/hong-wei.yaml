personal_notes: |
  武汉大学数学与统计学院基础数学系讲师。研究方向：辛几何与泊松几何。
  Penn State 博士(2013)，导师 Ping Xu (徐平)，PhD 学位论文 'Some problems in Poisson geometry'。
  博士毕业直接加入武大做博士后，后转讲师。
  主要工作：(1) 与 Ping Xu 合作 del Pezzo 曲面的 Poisson cohomology；(2) toric Poisson
  流形的 Poisson cohomology (系列两篇)；(3) Lie bialgebra 的 Atiyah class；(4) toric
  varieties 上全纯 polyvector fields 的 BV/Gerstenhaber 代数结构。
  与徐晓濛组(Stokes phenomenon、quantum groups) 在 Poisson/Lie 代数结构上有潜在交集。
  2026 HUST 数学物理与几何研讨会武大参会学者之一。
