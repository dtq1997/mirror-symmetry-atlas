personal_notes: |
  武汉大学数学与统计学院教授(2019 起)、博士生导师。研究方向：多复变与复几何 (复几何、
  Hodge 理论、变形理论、Moishezon 流形)。2011 年博士毕业后在浙大数学中心博士后
  (2011.7-2013.9)，2013 年起在武大任职。
  与 Kefeng Liu (刘克峰) 合作 4 篇，这可能指向博士师承 [待验证]。
  近年与 Christopher D. Hacon 等国际学者合作，研究 Kahler 族中的 adjoint classes。
  2026 年 HUST 数学物理与几何研讨会武大参会学者之一。
