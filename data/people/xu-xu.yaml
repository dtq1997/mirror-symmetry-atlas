personal_notes: |
  武汉大学数学与统计学院教授(2024.12 起)、博士生导师。国家级青年人才、武大弘毅青年学者、
  湖北省数学学会副理事长、武大本科生院教务处副处长。
  研究方向：离散共形几何、微分几何、广义相对论的数学理论。
  代表性成果：(1) 证明三维流形上堆球度量的整体刚性，将 Koebe-Andreev-Thurston 刚性定理推广
  到三维；(2) 证明曲面上反演距离大于 -1 时 Bowers-Stephenson 刚性猜想；(3) 解决 Glickenstein
  猜想(一般形式离散共形结构的刚性)；(4) 证明 Bowers-Stephenson 收敛性猜想(Jordan 区域上反演
  距离堆圆可以逼近黎曼映射)；(5) 引入 α-曲率并证明参数化离散单值化定理；(6) 给出闭曲面和带边
  曲面上离散共形结构的分类。
  学生：郑超(Chao Zheng，2019-2025 博士，中国博士后博新计划、北大博雅博士后，现 BICMR 博后)；
  在读博士卞月容(2024-)、熊芷雯(2025-)，硕士多位。
  arXiv 上仅列出近期论文；更多早期发表于 Peking Math. J., Trans. AMS, J. Funct. Anal.
  Calc. Var. PDE, IMRN, Math. Res. Lett.。
