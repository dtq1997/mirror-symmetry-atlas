personal_notes: |
  中山大学数学学院副教授。曾在清华大学丘成桐中心做博士后（受 Tsinghua Postdoc Grant 资助）。
  博士学位来源和导师尚未查明。早期与胡建勋(Jianxun Hu)合作 GW blow-up 公式 (2013-2014)，
  可能博士师从胡建勋 [待验证]。
  核心成果：与 Si Li, Yefeng Shen, Rachel Webb 合作证明 LG mirror symmetry conjecture (JEMS 2022)，
  这是该方向的里程碑式结果。
  研究方向涵盖：(1) FJRW theory 和 LG mirror symmetry (核心方向);
  (2) orbifold GW/LG theory; (3) Virasoro constraints; (4) 近年拓展到 cluster algebras 与 quantum cohomology。
  与 Si Li (清华) 深度合作 5 篇，是主要合作者。
  2026 HUST 会议报告: Landau-Ginzburg mirror symmetry for $x^p + y^q$，joint with Si Li and Yifan Li.
  Math Genealogy Project 无此人条目。
