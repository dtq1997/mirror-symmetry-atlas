personal_notes: |
  注：签到表手写"郁真"系"郇真"误读（郇 Huán 与郁 Yù 字形相近）。
  HUST 数学中心在册为 Zhen Huan，个人主页 huanzhen84.github.io/zhenhuan/，
  slug 统一为 huan-zhen（姓-名拼音）。

  UIUC 博士 (2017) → SYSU Research Associate (2017-2019) → HUST 数学中心副教授 (2019.7-)。
  研究方向：代数拓扑、代数几何、数学物理；核心成果 "Quasi-Elliptic Cohomology" 系列 (Adv. Math. 2018)。
  2026 HUST 数学物理与几何研讨会参会教师。
