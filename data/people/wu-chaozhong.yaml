personal_notes: |
  清华本硕博（导师张友金）→ SISSA 博后（Marie Curie Fellow，跟随 Dubrovin）→ 中山大学教授。
  与杨迪有平行的学术轨迹（同为张友金学生，同在 SISSA 做博后）。
  核心方向是可积系统层级的 tau 函数和 Virasoro 对称性。
  近年主攻 KP-mKP hierarchy（两个导数的伪微分算子框架），以及无穷维 Frobenius 流形。
  2026 HUST 会议报告: Additional symmetries of the KP-mKP hierarchy and Virasoro constraints to the Burgers-KdV hierarchy，与 Zongyao Feng, Lumin Geng 合作。
  GAGP 团队（代数几何/辛几何/数学物理）成员。
  NSFC 青年基金、面上项目支持。
  在 Adv. Math、IMRN、CMP、JPA、Lett. Math. Phys. 等发表论文。
  Math Genealogy 上暂无条目。
