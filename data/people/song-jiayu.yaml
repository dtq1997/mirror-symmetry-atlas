personal_notes: |
  中山大学数学学院博士生，导师李长征，方向 quantum Schubert calculus / quantum K-theory。
  从 2022 年起与李长征合作，累计 4 篇论文，主要方向：
  (1) Seidel representation 在 quantum K-theory 中的研究（博士论文主线）；
  (2) quantum Pieri rule for flag varieties via Seidel representation；
  (3) quantum Chern character from quantum K-theory to quantum cohomology (与柯华忠、李长征合作)；
  (4) quantum Schubert calculus for smooth Schubert divisors of complete flag varieties (与 Rui Xiong、Mingzhi Yang)。
  2024 年在《中国科学: 数学》发表中文综述《李长征/宋家宇: Seidel 表示的量子 Pieri 公式》。
  是李长征组活跃的年轻合作者之一，与 Mingzhi Yang 经常合作。
  2026 年 4 月 HUST "数学物理与几何研讨会"参会人员之一。
  [待验证] 博士入学具体年份。
