personal_notes: |
  中山大学数学学院博士生导师（2025 年 4 月加入）。此前在燕园北京数学科学与应用研究院 (BIMSA) 任研究员。
  研究领域横跨多个方向：
  (1) 编码理论（量子码、代数几何码、多点码）；
  (2) 函数域和 Drinfeld 模理论（Drinfeld modular curves, BBGS towers, Weil pairing）；
  (3) 奇点理论（K. Saito j-functions, Tjurina algebra, 与 Stephen S.-T. Yau 合作）；
  (4) Lie 代数胚对的变形 (2025)。
  与 Stephen S.-T. Yau (清华丘成桐中心) 长期合作，方向包括量子码 (2018) 和简单椭圆奇点分类 (2024)。
  2025 年与 Xiuwu Zhu 在 Drinfeld 模曲线塔方向获得 Ihara quantity 的新最优结果。
  研究成果在 IEEE IT, Finite Fields, DCC 等期刊发表。
  博士学位及师承信息 [待验证]。
  2026 年 4 月 HUST "数学物理与几何研讨会"参会人员之一。
  此次会议方向与其主研究（函数域/编码理论）跨度较大，可能是代表中山大学参会或对会议主题（数学物理）有兴趣。
