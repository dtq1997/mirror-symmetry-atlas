personal_notes: |
  BIMSA 博士后，数学物理方向，同时挂靠清华 YMSC。
  核心研究：矩阵模型的 W-表示 (W-representations)，张量模型，Hurwitz 理论。
  她和吴可、赵伟忠、Liu、Zhang 等的工作被称为 "WLZZ model"，
  由 Alexandrov (arXiv:2212.10952) 将其与 dessins d'enfant 联系起来。
  2026 单独作者论文 (arXiv:2602.04779) 是重要突破：
  将 W-operators 通过 Grojnowski-Nakajima 同构映射到 Hilb^n(C^2) 的等变上同调，
  用 Hecke correspondence 实现 ladder operator E_1，
  用 Ward identities of Gaussian beta-ensemble 解释 beta-deformed W_0。
  统一了随机矩阵理论、枚举几何和共形场论中的 beta-deformed 可积结构。
  2026 HUST 会议报告: Geometric realization of W-operators。
  博士教育信息未公开，但从早期合作者 (吴可、赵伟忠，均首都师范大学)
  以及论文署名 affiliation 模式推断，博士很可能来自首都师范大学。
