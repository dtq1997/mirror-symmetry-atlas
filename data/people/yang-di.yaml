personal_notes: |
  张友金博士 → Dubrovin 博后 → Zagier 博后 → USTC 教授，学术轨迹横跨三大学派。
  被低估的关键桥梁：11 篇与 Dubrovin 合作（数量仅次于 Zhang-Youjin 的 15 篇），
  同时与张友金(7)、刘思齐(6)、周春辉(5)、Don Zagier(5) 深度合作。
  直接连接 SISSA/Dubrovin 学派和清华张友金/刘思齐组。
  代表作：
  - "On tau-functions for the KdV hierarchy" (with Dubrovin, Zagier)
  - "Geometry and arithmetic of integrable hierarchies of KdV type" (with Dubrovin, Zagier)
  - "Hodge integrals and tau-symmetric integrable hierarchies" (with Dubrovin, Liu, Zhang)
  2026 HUST 会议报告: Uniform large genus asymptotics for BGW and Witten numbers
