personal_notes: |
  西南交通大学数学学院讲师 (2011.06 起至今)，硕士生导师。
  四川大学数学博士（微分几何方向）[待验证]。

  研究方向是几何拓扑与数学物理的交叉。具体分为两个阶段：

  阶段一 (2014-2016)：与川大陈柏辉 (Bohui Chen)、李安民 (Anmin Li)、
  杜承勇 (du-chengyong) 合作 orbifold symplectic flop、orbifold
  Gromov-Witten、Ruan cohomology 方向，川大团队的早期成员。

  阶段二 (2021-至今)：转向 5d/6d gauge theory 与 topological vertex
  formalism。与 Futoshi Yagi (SWJTU 同事)、UESTC 的 Sung-Soo Kim、
  苏州大学 Rui-Dong Zhu 的深度合作，研究 5-brane web + O5-plane /
  O7+-plane 的 Nekrasov partition function / topological vertex，
  推进了 orientifold plane 下的 mirror symmetry 和 non-toric Calabi-Yau
  几何。

  2022 年获第九届世界华人数学家大会 45 分钟邀请报告。
  AMS Mathematical Reviews 和 ZbMath 审稿人。

  与本项目核心方向的连接：
  - mirror symmetry: 通过 Nekrasov-Seiberg-Witten curve 的几何对应；
  - orbifold Gromov-Witten: 早期工作。

  2026 HUST 数学物理与几何研讨会参会。
