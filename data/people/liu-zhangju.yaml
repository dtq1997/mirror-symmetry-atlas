personal_notes: |
  北京大学数学科学学院教授 (2021-01 退休)。

  教育: 吉林大学本科 (1982)→北大硕士 (1984)→北大博士 (1986)→讲师 (1986-1990)
  →UC Berkeley 博后 (1990-1992, 与 Weinstein 合作)→北大副教授/教授 (1993 起)。
  博士导师信息 [待验证]。

  主要贡献: 与 Alan Weinstein, Ping Xu 合作于 1997 年 JDG 论文引入 Courant algebroid / Lie bialgebroid
  概念, 并在 1998 CMP 建立 Dirac structures 与 Poisson homogeneous spaces 对应。
  这两篇是 Poisson 几何/代数胚论领域的奠基性工作。
  后期与陈酌合作 E-Courant algebroid 和 higher structures。

  担任《数学进展》主编。培养博士陈酌 (北大 2004) 等。
