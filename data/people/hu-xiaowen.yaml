personal_notes: |
  清华本博（周坚组，2002-2014）→ BICMR 博后（2014-2016）→ 中山大学特聘副研究员（2016-2022）
  → 大湾区大学 tenure-track 副教授（2022.12-）。

  **与张庆生同门：** 两人都是周坚的学生（张庆生 2015-2020），且 2022-2024 年前后都进入大湾区大学，
  是本项目中的重要同门连接。

  研究方向：Gromov-Witten 理论、镜像对称（特别是二次超曲面与 Fano 完全交）、量子上同调、
  Picard-Fuchs 方程、代数 K 理论、Hodge 理论。

  代表作：
  - "Mirror symmetry for quadric hypersurfaces" (2022) — 计算二次超曲面的 Landau-Ginzburg
    镜像模型的 Calabi-Yau compactification，推导 narrow 与 broad Picard-Fuchs 方程，
    建立 Frobenius 流形层面的镜像对称同构。
  - "Gamma conjecture II for quadrics" (2021, with Hua-Zhong Ke)
  - "Big quantum cohomology of Fano complete intersections" (2015)
  - "The Quantum McKay Correspondence for Singularities of type D" (2012)

  近期有向代数 K 理论（Witt 向量上 smooth schemes）的方向扩展。

  发表于 Adv. Math., IMRN, Math. Ann., Manuscripta Math., Sci. China Math. 等。

  2026 HUST 会议参会者。研究方向与本项目核心（Frobenius 流形、镜像对称）高度重合，
  是重要的桥接节点。
