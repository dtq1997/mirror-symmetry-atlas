personal_notes: |
  哥本哈根大学数学系教授，资深数学家（1987 年 PhD）。
  非交换几何、循环同调、指标理论核心人物之一。
  与 Boris Tsygan 合作最密集 (Riemann-Roch via deformation quantization, formality for
  algebroid stacks, DGLA/formality 系列)。
  奠基性贡献：
  (1) 与 Bressler-Gorokhovsky-Tsygan 合作的 "Formality for algebroid stacks" (2009)
      以及后续 Riemann-Roch 型定理;
  (2) 与 Gorokhovsky-de Kleijn 的 Equivariant Algebraic Index Theorem (2017);
  (3) 早期关于 crossed products 循环上同调的博士工作。
  与 Connes、Karoubi、Cuntz、Weibel 合作主编 "K-Theory and Noncommutative Geometry"
  (EMS, 2008)。Oberwolfach "Non-Commutative Geometry and Cyclic Homology"
  workshop (2022) 共同组织者 (与 Alain Connes, Thomas Nikolaus, Guoliang Yu)。
  与 BIMSA 有联系（兼职研究员 [待验证]）。2026 HUST 数学物理与几何研讨会受邀报告人。
  波兰裔，长期在丹麦工作。
