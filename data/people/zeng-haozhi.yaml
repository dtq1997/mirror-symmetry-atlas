personal_notes: |
  HUST 数学与统计学院（非 HUST 数学中心）。arXiv 最新论文 2512.06646 明确显示其单位为
  "School of Mathematics and Statistics, Huazhong University of Science and Technology"。
  学术路径：Osaka City University 博士 (2014 年已在 Osaka 发表 toric origami 论文，约 2015-2016 毕业)
  → HUST。博士导师 [待验证] 极可能是 Mikiya Masuda (与他合作 4 篇且是早期合作最密切的)。

  研究方向：toric topology 与代数几何的交叉，核心关注 Hessenberg 流形与 Peterson 流形。
  重要成果：与 Hiraku Abe 合作证明 A 型 Peterson 流形的 totally nonnegative part 是 CW 复形
  (Rietsch 猜想)，近期 2025 年扩展到任意 Lie type (joint with Abe, Tao Gui)。
  NSFC 青年基金 11901218 (2020-2022)。日本合作网络广泛 (Masuda, Abe, Horiguchi, Sato, Kuroki)。
