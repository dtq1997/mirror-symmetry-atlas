personal_notes: |
  香港中文大学数学系教授 (2023 起)。

  学术路径: CUHK 本科 (2002)→CUHK MPhil (2004, 导师 Kang Zuo)→CUHK PhD
  (2008, 导师 Conan Leung, 论文 "Strominger-Yau-Zaslow Transformations in Mirror Symmetry")
  →Harvard Croucher 博后 (合作者 Yau, 2008-2010)→IHES Hodge Fellow (2010-2011)
  →IPMU 东京 (2011)→CUHK 助理/副/正教授。

  主要贡献: toric CY 的 SYZ 镜像对称 (与 Leung, Lau, JDG 2012, 获 ICCM Silver),
  open-closed GW 的公式及其镜像对称应用, Ooguri-Vafa 度量与全纯圆盘墙穿越,
  local CY 的同调镜像对称, toric CY 的 quasimap SYZ。
  与李勤在 CUHK 组内合作做 Kähler 流形 geometric quantization / deformation quantization。

  注: Harvard 是博后 (2008-2010) 不是 PhD。PhD 是 CUHK 本校培养。
