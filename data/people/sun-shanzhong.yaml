personal_notes: |
  南开大学陈省身数学研究所博士 (2001) → 北大博后 → 首都师范大学教授。
  研究横跨三大领域：(1) 辛几何/拓扑 (Fukaya category, Floer homology)；
  (2) 天体力学 (N-body central configurations, Kepler problem, Maslov index)；
  (3) Resurgence 理论 (mould calculus, Moyal star product, topological string)。
  与 David Sauzin (CNRS, Ecalle resurgence 核心传承者) 长期深度合作 (7 篇)。
  博士生李镛 (Yong Li) 是 resurgence 方向的主要合作者，博士论文由 Sun 和 Sauzin 联合指导。
  2025 年与 Andersen, Sauzin 等证明 Witten asymptotic expansion conjecture for WRT invariants
  of Seifert fibered homology spheres，GPPV invariant 方向的重要突破。
  2026 HUST 会议报告: Around Witten's Asymptotic Expansion Conjecture，GPPV invariant 的 quantum modularity。
  与龙以明 (Yiming Long) 合作过一篇 (2012)，龙以明是南开辛几何方向领军人物，
  但尚无直接证据确认龙以明是其博士导师。
  Math Genealogy 上未查到条目。
