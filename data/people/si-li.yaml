personal_notes: |
  清华 YMSC 教授，数学物理方向核心。师从丘成桐。
  代表工作：
  (1) B-twisted sigma model 与 BV 量子化的 Costello-Li 纲领，
  (2) Landau-Ginzburg mirror symmetry conjecture 的证明（与 He, Shen, Webb 合作，JEMS 2022），
  (3) Primitive forms / 奇点 mirror symmetry（与 K. Saito, Li Changzheng 合作，JEMS 2017），
  (4) Kodaira-Spencer gravity 与 holomorphic Chern-Simons。
  何伟强博后期间的主要导师之一，是中山大学/清华 LG 方向合作的关键桥梁。
