personal_notes: |
  北大博士（2004, 导师刘张炬）→ 首师大博后 → 北大博后 → Penn State 讲师 → 清华副教授 (2009-)。
  核心研究：Poisson 几何、Lie algebroid / Courant algebroid、Atiyah class、形变量子化。
  与 Penn State 的 Ping Xu、Mathieu Stiénon 长期合作，代表作包括 Atiyah Classes to Homotopy
  Leibniz Algebras (CMP 2016)、Regular Courant Algebroids (J. Symplectic Geom. 2013)、
  Poisson 2-groups 等。
  2013 北京市科协青年优秀科技论文一等奖；2014 清华大学学术新人奖。
  师承路径: 刘张炬 (PKU) → 陈酌 (Tsinghua)。刘张炬是中国 Poisson 几何学派的代表人物。
  2026 HUST 会议参会人员 (未做邀请报告)。
