personal_notes: |
  曲阜师范大学本科 → 北大博士 (刘小博指导，2010-2015) → 山东大学。
  2016-2019 访问 Columbia。2026 年晋升教授 (齐鲁青年学者)，博士生导师。
  研究核心：曲线模空间上的 tautological relations 及其在 Gromov-Witten 理论中的应用。
  主要贡献：
  (1) Topological recursion relations：从 Pixton's formula 推导 degree-g TRR，
      证明 genus <= 4 的 Pixton relations 蕴含已知 TRR。与 Clader, Janda, Zakharov 合作。
  (2) Hodge integrals：建立 Hodge integrals 的 universal equations，
      提出并部分证明带 target variety 的 Virasoro conjecture 和 lambda_g conjecture。
  (3) G-function：与刘小博合作证明 ADE singularities 和 P^1 orbifolds of ADE type
      的 genus-2 G-function vanishing (Dubrovin-Liu-Zhang conjecture)。
  (4) FJRW theory：证明 Fermat cubic singularity 的 higher genus finite generation
      和 holomorphic anomaly equation。
  与刘小博 (导师) 的关系密切，是刘小博在 GW theory 方向的核心学生。
  NSFC 资助: 11601279, 12071255。
  2026 HUST 会议报告: Tautological Relations on the Moduli Space of Curves。
