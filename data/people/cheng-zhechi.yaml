personal_notes: |
  武汉大学数学与统计学院特聘副研究员。Columbia University 数学博士(2020)。
  研究方向：辛 Khovanov 同调、纽结 Floer 同调、低维拓扑。
  学位论文 'Jones grading from symplectic Khovanov homology' 建立了辛 Khovanov 同调的
  Jones 分级结构，该工作后发展为 'Bigrading the symplectic Khovanov cohomology' (AGT 2023)。
  与 Matthew Hedden、Sucharit Sarkar 合作 Murasugi sum 与极端纽结 Floer 同调 (Quantum Topol. 2025)。
  2026 HUST 数学物理与几何研讨会武大参会学者之一。
