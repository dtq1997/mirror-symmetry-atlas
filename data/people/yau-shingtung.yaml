personal_notes: |
  菲尔兹奖（1982）、Wolf 数学奖（2010）。Calabi 猜想、正质量猜想的证明者。
  Calabi-Yau 流形以他命名。
  1987-2022 在 Harvard 任讲席教授，培养了梁乃聪（1993）、李思（2011）等数学物理方向中国学生。
  2022 年起回国全职任清华大学丘成桐数学科学中心主任。
  倡议建立 BIMSA（北京雁栖湖应用数学研究院）。
