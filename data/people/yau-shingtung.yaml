personal_notes: |
  1949.4.4 出生于汕头。
  菲尔兹奖 1982、Wolf 数学奖 2010、Shaw Prize 2023。Calabi 猜想、正质量猜想的证明者。
  Calabi-Yau 流形以他命名。66+ PhD 学生 (MGP)。
  1987-2022 Harvard 讲席教授；培养了梁乃聪 (1993)、刘秋菊 (2002)、李思 (2011)、田刚等学生。
  2022 起回国全职任清华 YMSC 主任。
  机构建设：港中大 IMS (1993)、Morningside Center (1995)、Harvard CMSA (2014)、清华 YMSC、BIMSA。
