personal_notes: |
  清华大学数学科学系博士生，2019 年入学（邮箱 zhangxh19 表明入学年份），导师周坚 (Jian Zhou)。
  方向 integrable hierarchies，聚焦 BKP/KP hierarchy 的 tau 函数 connected n-point 函数公式。
  唯一 arXiv 论文 (2506.00451) 将 BKP hierarchy 嵌入到 KP hierarchy，给出 connected bosonic n-point
  函数的新公式，并证明与 Wang-Yang 2022 年公式等价。
  [待验证] 与中山大学的关系：可能是短期访问、合作研究或准备入职。HUST 签到表列其为 SYSU 参会人员，
  但 arXiv 论文 (2025.6) affiliation 仍是清华。
  研究生态与周坚一脉相承（KP 可积系统、Hodge 积分、拓扑递归），与 Frobenius 流形、Witten-Kontsevich
  tau 函数等主题关联。
  SYSU 博导名单中有"张旭辉"但无超链接，可能是另一位同名或刚入职但主页未建。
