personal_notes: |
  香港中文大学讲座教授, IMS (数学科学研究所) 主任。

  MIT PhD 1993, 主导师为 Isadore Singer (Fields 奖级别, 早期与 Atiyah 合作 index theorem),
  联合指导为 Shing-Tung Yau。博士论文 "Differential Geometric and Symplectic Interpretations
  of Stability in the Sense of Gieseker"。早期任 MIT Moore Instructor, 后在 Minnesota 任教,
  加入 CUHK 后建立 SYZ / mirror symmetry 研究中心。

  主要贡献: SYZ 猜想的 "no corrections" 版本 (2000 Adv. Math.),
  special Lagrangian vs. Hermitian-Yang-Mills 通过 Fourier-Mukai 变换对应 (与 Yau, Zaslow 2001),
  toric CY 的 SYZ 镜像对称 (与 Kwokwai Chan, Siu-Cheong Lau, JDG 2012)。
  方向还涉及 G2/Spin(7) special holonomy, hyperkähler, Rozansky-Witten, Witten-Morse theory, ADE bundles。

  培养 PhD: Kwokwai Chan (2008, SYZ), Siu-Cheong Lau (2011), Li Changzheng 等,
  成为华人几何/镜像对称圈重要节点。
