personal_notes: |
  香港中文大学讲座教授。师从丘成桐。
  代表方向：SYZ mirror symmetry、special holonomy (G2 / Spin(7))、
  Kähler 流形量子化（与陈国威、李勤长期合作）。
  培养了李长征、Kwokwai Chan（陈国威）等中国数学家。
  是中山大学 / 南科大 / 清华 GW 理论学派与港方学派的桥梁。
