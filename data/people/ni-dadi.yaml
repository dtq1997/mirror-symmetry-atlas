personal_notes: |
  河南大学数学与统计学院讲师 (2023.07 起)。本科河南大学 (2014-2018 拔尖班)，
  博士清华大学 (2018-2023)，导师几乎确定为陈酌 (Zhuo Chen)——所有早期
  论文均与陈酌合著，且博士期间频繁合作。

  研究方向：differential geometry 与 nonlinear Lie theory。
  具体工作：
  (1) Hopf algebras / L∞ algebras arising from dg manifolds 与 Lie pairs
      (与陈酌、程家豪 2019/2022);
  (2) Atiyah classes 和 Atiyah constructions for Lie algebroid
      connections (2025 年单独和 2025 年合作两篇);
  (3) Hyperkähler structures 在 hyper-Lie Poisson manifolds (sl(2,C)
      adjoint orbit) 上 (与 Kaichuan Qi, 2025);
  (4) Generalized complex geometry 中的 Atiyah classes;
  (5) 2025 还与陈酌、Chuangqiang Hu、Maosong Xiang 合作 infinitesimal
      deformations of Lie algebroid pairs;
  (6) 2026 最新与 Kaichuan Qi 构造 [G/G] stack 上的 S¹-gerbes。

  2025 年 6 月河南大学辛几何与数学物理研讨会 (6/7-8) 担任会议联系人并
  作报告 "Hyperkähler structures on the adjoint orbits of sl(2,C)"。

  与程家豪 (cheng-jiahao, NCHU) 是并肩的博士同期合作者，两人+陈酌
  发表了早期几篇论文。程家豪博士在北大而非清华，说明他们可能通过
  陈酌学派（清华 Lie pair/Atiyah class 方向）建立联系。

  2026 HUST 数学物理与几何研讨会参会。
