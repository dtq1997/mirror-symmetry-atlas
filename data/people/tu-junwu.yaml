personal_notes: |
  上海科技大学。PhD at Wisconsin-Madison under Andrei Caldararu.
  2026 HUST 会议报告: B-model categorical enumerative invariants and the holomorphic anomaly equation
  研究 CY threefold 上导出范畴的 enumerative invariants，BCOV holomorphic anomaly equation。
  Categorical enumerative invariants (CEI) 是其核心方向，与 Caldararu 共同发展。
