personal_notes: |
  陕西师范大学数学与统计学院副教授。
  核心方向：groupoid C*-代数、K-理论指标公式、边界 groupoid 上的椭圆算子、
  Fredholm groupoid、Lie-Rinehart 代数。属于 Connes-Debord-Skandalis-Nistor
  传统中的 noncompact/singular 流形分析学派。

  主要合作者：
  - Catarina Carvalho (Lisbon) - 4 篇，最早 2011 合作；
  - Victor Nistor (Lorraine/Penn State) - 3 篇；
  - Bing Kwan So - 2 篇关于 boundary groupoid 指标公式；
  - Ivan Beschastnyi (Padova) - 2 篇 2023-2024。

  与 Nistor 长期合作表明其博士训练可能与 Penn State / Nistor 学派相关
  [待验证]。2011 年最早论文即与 Carvalho 合作，时间线也与北美博士后
  阶段吻合。

  与国内 Lie algebroid 圈的连接：
  (1) 2019 年与郎红蕾 (Honglei Lang)、Yanbin Yin 合作 "On Lie Bialgebroid
      Crossed Modules" (1910.12225);
  (2) 2024-2025 与陈酌 (Zhuo Chen)、程家豪 (Jiahao Cheng)、Maosong Xiang
      合作 "smooth dynamical twists"、"Brace B∞ algebras associated
      with Hopf algebroids"。

  2026 HUST 数学物理与几何研讨会参会。
