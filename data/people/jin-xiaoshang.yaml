personal_notes: |
  HUST 数学与统计学院副教授（2024 年起）。
  学术路径：南大本硕博 (2009-2018) → UCSC 访问 (2017-2018) → PKU BICMR 博后 (2018-2020)
  → HUST 讲师 (2020-2023) → HUST 副教授 (2024-)。
  研究方向：共形几何、几何分析，具体为 conformally compact Einstein (CCE) 流形的边界正则性、
  紧致性与特征值估计，近年拓展到 p-Laplacian 和 Willmore 不等式。
  UCSC 访问期与 Jie Qing 合作，并由此进入 Chang-Ge-Qing 的 CCE 紧致性研究圈
  (2021 年 Graham-Lee 度量唯一性 Part III 是代表作)。
  [待验证] 南大博士导师，UCSC 访问导师很可能就是 Jie Qing。
