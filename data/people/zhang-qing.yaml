personal_notes: |
  HUST 数学与统计学院。研究方向：p-adic 群表示、自守表示、L-函数、数论。
  学术路径：浙大本科 (2008) → AMSS/中科院数学所硕士 (2008-2010) → OSU 博士 (2010-2016)
  → HUST。OSU 博士后阶段无公开信息，期间已与 Baiying Liu (Purdue) 合作。
  核心合作网络：Clifton Cunningham (Calgary) 的 Arthur packets / ABV-packets 项目；
  Baiying Liu (Purdue) 的 Arthur representations / 局部 converse theorem 项目。
  2020 年 "Arthur packets for G_2" (joint with Cunningham, Fiori) 是代表作之一。
  注: "张庆"与"张庆生"(zhang-qingsheng, 清华) 是不同人；arXiv 有多位 Qing Zhang，
  本页仅收录 HUST p-adic 表示论方向的 Qing Zhang。
