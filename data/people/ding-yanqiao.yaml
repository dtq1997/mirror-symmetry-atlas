personal_notes: |
  郑大本硕毕业生（某种意义上）→ 中大博士（Jianxun Hu 组，2013-2016）→ 郑大讲师 →
  索邦博后（2019-2020，国家公派）→ 郑大副教授（2024.1-）。

  方向：**实枚举几何的严格渐近分析**，特别是：
  - Welschinger 不变量（辛 4-流形的实 GW 不变量）
  - 实 double Hurwitz 数的 tropical 对应与渐近分析
  - Caporaso-Harris 型递推公式与 floor diagrams

  **关键连接：** 2026 年新论文 2602.04191 直接回答 Dubrovin-Yang-Zagier 关于 simple Hurwitz 数
  一致上界的 open question（见该论文 Abstract）——这正是本项目 ustc 杨迪组核心工作的方向。
  与 HUST 会议核心议题高度契合。

  2025 年 "Refined floor diagrams relative to a conic..." (与 Jianxun Hu) 发表在 J. London Math. Soc.，
  献给吴可教授八十寿辰；证明在 P² blow-up 上 higher genus 相对 GW 不变量（带 Lambda class 插入）
  的 q-refined 对应定理。

  代表发表期刊：J. Combin. Theory Ser. A, J. Algebraic Combin., Math. Z., Math. Notes, J. London Math. Soc.

  2026 HUST 会议参会者。
