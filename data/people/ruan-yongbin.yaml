personal_notes: |
  四川大学本科 → UC Berkeley 博士 (1991, Kirby 指导) → 密歇根大学教授 →
  2019 起浙大数学高等研究院永久教授、主任。
  Gromov-Witten 不变量、镜像对称、FJRW 理论的核心开创者之一。
  FJRW theory = Fan (范辉军) + Jarvis + Ruan + Witten：Landau-Ginzburg 奇点的 GW 理论。
  2008 年与胡建勋、Tian-Jun Li 合作证明 uniruledness 的 birational invariance (Invent. Math.)，
  symplectic topology 里程碑成果。
  组织了数届国内 GW 理论 workshop，是国内该方向发展的关键推动者。
