personal_notes: |
  清华博士 (Si Li 组, 2016-2019) → 南开大学数学科学学院讲师。
  专长：Landau-Ginzburg / Calabi-Yau 对应、BV∞ 代数、Frobenius 流形几何化构造。

  与导师 Si Li 的 2019 合作论文 "On the L2-Hodge theory of Landau-Ginzburg models" (Adv. Math. 2022)
  是博士期间代表作：为非紧 Calabi-Yau 上带紧临界点的全纯函数 f 建立 f-twisted Sobolev 空间理论，
  证明 strongly elliptic 条件下的 Hodge-to-de Rham 退化，由此通过 Barannikov-Kontsevich 构造
  Frobenius 流形，统一 Landau-Ginzburg 与 Calabi-Yau 几何，推广 K. Saito 的高阶 residue 与
  primitive form 理论。

  近年转向 cyclic/commutative BV∞ 代数的 Frobenius 流形构造 (2024-2026)，直接对应
  LG/CY 对应猜想在 genus 0 的代数实现。

  代表作：
  - "On the L2-Hodge theory of Landau-Ginzburg models" (with Si Li, Adv. Math. 2022)
  - "A perturbative construction of primitive forms from log Landau-Ginzburg mirrors of toric manifolds" (with K.W. Chan, Z.N. Ma)
  - "Cyclic BV∞ algebra and Frobenius manifold" (2024)

  2026 HUST 会议参会者。研究方向与杨迪、刘思齐、张友金的 Frobenius 流形/可积系统方向互补
  (B-model 代数进路 vs A-model 相交数/可积层级)。
