personal_notes: 'HUST 数学中心副教授（2026 年数学物理与几何研讨会组织联系人之一）。

  UESTC 本科 → 首师大硕士 → 北大 BICMR 博士 (2013-2017) + Penn State CSC 公派 (2015-2017)。

  核心学术伙伴是陈酌 (Tsinghua)，已合作 10+ 篇，涵盖 Lie algebroids, Courant algebroids, Atiyah classes,

  Lie pairs, homotopy Leibniz algebras, dg manifolds。

  与 Ping Xu (Penn State) 合作的 Atiyah/Todd classes 系列 (2017-2021) 很重要，

  博士联培期间打下的合作基础。研究偏 higher/derived 结构在 Lie 代数几何/数学物理中的应用。

  与王知远同为 2026 HUST 会议联系人。

  '
