personal_notes: |
  HUST 数学与统计学院副研究员。
  学术路径：上海交大本科肄业 (2003-2006) → Alberta 博士 (2017) → 美国 MSRI 博士后 → HUST。
  主要研究领域：凸几何、几何分析、黎曼几何、概率。发表在 Trans. AMS、JFA、JDE、CVPDE 等期刊。
  与 Elisabeth Werner (CWRU)、Deping Ye (Memorial U.) 合作 floating bodies / Ulam floating functions 系列。
  近期做"range decreasing group homomorphisms"和非紧 Minkowski 问题。
  注: arXiv 上另有至少两位独立的 Ning Zhang（优化/Defeng Sun 组、表示论/可积系统），需要作者歧义处理。
