  - id: '2603.02736'
    title: "Complexity of quantum cohomology"
    date: '2026-03-03'
    authors_raw: ["Xiaobo Liu", "Chongyu Wang"]
    matched_people: [liu-xiaobo]
    matched_concepts: [quantum-cohomology, frobenius-manifold, gromov-witten-theory]
    category: math.AG
    relevance_score: 15
    summary_zh: |
      刘小博（北大 BICMR 讲席教授、ICM 2006 invited speaker）与王重宇的新工作。

      将量子计算中的线路复杂度（circuit complexity）概念引入量子上同调的 2D TQFT 框架。核心思想：量子上同调给出 Frobenius 代数结构，对应的 2D TQFT 有唯一的基本门——handle operator $\Delta = \sum g^{ij} e_i * e_j$（quantum Euler class），以此定义量子态的复杂度，即需要多少次量子乘法才能从参考态到达目标态。

      主要结果：对 Fano 完全交叉和 (co)minuscule 齐性簇，估计了有限复杂度态的数目；对 $\mathrm{Gr}(2,n)$ 给出了精确描述；证明了量子 Euler class 除以点类后特征值的正性。

      把量子信息/计算复杂性视角引入经典代数几何（GW 理论）的有趣尝试。

  - id: '2601.07538'
    title: "Non-commutative cluster Lagrangians"
    date: '2026-01-12'
    authors_raw: ["Alexander B. Goncharov", "Maxim Kontsevich"]
    matched_people: [kontsevich]
    matched_concepts: [mirror-symmetry, derived-category]
    category: math.AG
    relevance_score: 20
    summary_zh: |
      Kontsevich（IHÉS，Fields 1998）与 Goncharov 的大型论文。

      闭曲面 $S$ 上秩 $m$ 平坦丛的模空间 $\mathrm{Loc}_m(S)$ 是 $K_2$-辛的，三维流形 $M$ 的边界给出其中的 $K_2$-Lagrangian。本文推广了这一构造：引入「$\mathcal{Q}$-图」——三维流形中共定向曲面的集合，是二部带状图的三维类比。通过 $\mathcal{Q}$-图在 $T^*M$ 中构造奇异 Lagrangian $\mathbb{L}$，研究其上容许 dg-层的栈，证明限制函子的像是 Lagrangian 的且具有 cluster 描述。

      涉及 microlocal sheaf theory、cluster 代数、辛几何的深层交叉，与 HMS 和 Fukaya 范畴研究密切相关。

  - id: '2601.19455'
    title: "The kernel of formal polylogarithms"
    date: '2026-01-27'
    authors_raw: ["Anton Alekseev", "Florian Naef", "Muze Ren"]
    matched_people: [alekseev]
    matched_concepts: [quantum-groups]
    category: math.QA
    relevance_score: 12
    summary_zh: |
      Alekseev（日内瓦大学教授，徐晓濛的博士导师，Faddeev 的学生）与 Naef、Ren 的工作。

      将多变量多对数函数视为球面纯辫 Lie 代数 $\mathfrak{p}_m$ 的泛包络代数的对偶元素，计算所有多对数函数的联合核确定的左理想 $J_m \subset U\mathfrak{p}_m$，引入 Lie 子代数 $\mathfrak{k}_m = \mathfrak{p}_m \cap J_m$ 并对 $m=4,5$ 给出显式计算。

      与 Drinfeld 结合子和 double shuffle 关系相关——后者正是 Alekseev 2006 年证明 Kashiwara-Vergne 猜想时的核心工具。

